name: 📊 Code Coverage
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  codecov:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      - name: 📦 Restore dependencies
        run: dotnet restore Compiler/compiler.csproj
      
      - name: 🏗️ Build
        run: dotnet build Compiler/compiler.csproj -c Release --no-restore
      
      - name: 🧪 Run tests with coverage
        run: |
          dotnet test Compiler/compiler.csproj \
            -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --settings .runsettings \
            --no-build \
            --verbosity normal
      
      - name: 🔍 Find coverage files
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== TestResults content ==="
          ls -la ./TestResults/
          echo "=== Looking for cobertura files ==="
          find ./TestResults -name "*.cobertura.xml" -exec ls -la {} \;
      
      - name: 📁 Prepare coverage for upload
        run: |
          mkdir -p ./coverage-output
          find ./TestResults -name "*.cobertura.xml" -exec cp {} ./coverage-output/ \;
          echo "=== Coverage output ==="
          ls -la ./coverage-output/
      
      - name: ☁️ Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage-output
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true
