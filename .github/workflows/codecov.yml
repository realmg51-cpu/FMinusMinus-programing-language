name: 📊 Code Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  codecov:
    name: 📊 Code Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
      
      - name: 🔍 DEBUG - List files
        run: |
          echo "=== Current directory: $(pwd) ==="
          echo "=== All files ==="
          ls -la
          echo "=== Compiler directory ==="
          ls -la Compiler/ || echo "No Compiler directory"
      
      - name: 📦 Restore Compiler
        run: dotnet restore Compiler/compiler.csproj
      
      - name: 🏗️ Build Compiler
        run: dotnet build Compiler/compiler.csproj -c Release --no-restore
      
      - name: 📊 Find coverage files
        run: |
          echo "=== Looking for coverage files ==="
          find . -name "*.cobertura.xml" -o -name "*.xml" | while read file; do
            echo "Found: $file"
            ls -la "$file"
          done
      
      - name: ☁️ Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/**/coverage.cobertura.xml
          flags: unittests
          name: F-- Code Coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true
