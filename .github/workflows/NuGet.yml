name: 📦 Publish to NuGet (Alpha)

on:
  push:
    tags:
      - 'v*-alpha*'  # Ví dụ: v2.0.0-alpha0
      - 'v*-pre*'     # Ví dụ: v2.0.0-pre0
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 2.0.0-alpha0)'
        required: true
        default: '2.0.0-alpha0'
      notes:
        description: 'Release notes'
        required: false
        default: 'Alpha preview release'

jobs:
  publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v5
    
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    
    - name: 🔢 Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        fi
        echo "Package will be: Fminusminus.${{ steps.version.outputs.VERSION }}.nupkg"
    
    - name: 📦 Restore
      run: dotnet restore Compiler/compiler.csproj
    
    - name: 🏗️ Build
      run: dotnet build Compiler/compiler.csproj -c Release --no-restore
    
    - name: 📦 Pack NuGet (Alpha)
      run: |
        dotnet pack Compiler/compiler.csproj \
          -c Release \
          --no-build \
          -o nupkg \
          -p:PackageVersion=${{ steps.version.outputs.VERSION }} \
          -p:PackageReleaseNotes="Alpha preview release - ${{ github.event.inputs.notes }}"
    
    - name: 📤 Push to NuGet.org (Alpha)
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      if: env.NUGET_API_KEY != ''
      run: |
        echo "📦 Publishing alpha version: ${{ steps.version.outputs.VERSION }}"
        dotnet nuget push nupkg/*.nupkg \
          --api-key $NUGET_API_KEY \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
    
    - name: 📤 Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Fminusminus-${{ steps.version.outputs.VERSION }}
        path: nupkg/*.nupkg
    
    - name: ✅ Alpha release complete
      run: |
        echo "🎉 Alpha release v${{ steps.version.outputs.VERSION }} published!"
        echo "📦 NuGet: https://www.nuget.org/packages/Fminusminus/${{ steps.version.outputs.VERSION }}"
