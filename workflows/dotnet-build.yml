name: 🔨 .NET Build

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'Compiler/**'
      - 'Test/**'
      - '*.csproj'
  pull_request:
    branches: [ main ]
    paths:
      - 'Compiler/**'
      - 'Test/**'
      - '*.csproj'
  workflow_dispatch:  # Cho phép chạy tay

jobs:
  build:
    name: 🏗️ Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: [8.0.x, 7.0.x]
      fail-fast: false  # Tiếp tục build trên OS khác nếu 1 OS fail
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Lấy full history để kiểm tra version
      
      - name: 🔧 Setup .NET ${{ matrix.dotnet }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}
      
      - name: 📦 Restore dependencies
        run: dotnet restore
      
      - name: 🏗️ Build solution
        run: dotnet build --configuration Release --no-restore
      
      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.dotnet }}
          path: |
            Compiler/bin/Release/
            Test/bin/Release/
          retention-days: 7
      
      - name: ✅ Build success
        run: echo "✅ Build thành công trên ${{ matrix.os }} với .NET ${{ matrix.dotnet }}!"
